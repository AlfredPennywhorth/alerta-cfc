name: Monitor CFC Edital

on:
  schedule:
    - cron: '0 12 * * *' # Executa todos os dias às 12hs
  workflow_dispatch: # Permite execução manual pelo painel do GitHub

jobs:
  check-edital:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup do Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar script de monitoramento
        env:
          TELEGRAM_BOT_TOKEN: 8923049263:AAF3reGJ9UL0V7g9sicL2DyS_YNpApJoMpg
          TELEGRAM_CHAT_ID: 8617930268
        run: python monitor.py
